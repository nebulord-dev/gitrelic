name: Publish

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify core runtime deps are a subset of cli runtime deps
        run: |
          CORE_DEPS=$(jq -r '.dependencies // {} | keys[]' packages/core/package.json | sort)
          CLI_DEPS=$(jq -r '.dependencies // {} | keys[]' apps/cli/package.json | sort)
          MISSING=$(comm -23 <(echo "$CORE_DEPS") <(echo "$CLI_DEPS") || true)
          if [ -n "$MISSING" ]; then
            echo "❌ apps/cli is missing runtime deps that @gitrelic/core declares:"
            echo "$MISSING" | sed 's/^/    - /'
            exit 1
          fi
          echo "✓ All core runtime deps are declared in cli"

      - name: Build
        run: pnpm build

      - name: Release
        run: pnpm exec semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
