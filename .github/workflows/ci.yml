name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check-title:
    name: PR Title
    runs-on: ubuntu-latest
    steps:
      - name: Check conventional commit format
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          pattern='^(feat|fix|chore|ci|docs|test|refactor|perf)(\(.+\))?\!?\:\s.+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must follow conventional commits format."
            echo "Examples: 'feat: add Vue support' or 'fix: resolve false positives'"
            echo "Got: $PR_TITLE"
            exit 1
          fi

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

  install-smoke:
    name: Install Smoke Test
    # Packs the cli into a tarball and installs it with plain `npm install`
    # in a clean directory — catches broken publishes before they happen.
    # Specifically catches the `workspace:*` protocol leak that broke 1.4.0.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify core runtime deps are a subset of cli runtime deps
        # @gitrelic/core is bundled into the cli at build time (noExternal), so
        # every runtime dep of core must ALSO be declared as a runtime dep of
        # cli — otherwise the bundled `require('...')` calls will fail at
        # install time. The smoke test below catches this for the common case,
        # but only if the missing dep isn't accidentally satisfied as a
        # transitive of something cli already declares. Do an explicit
        # subset check so drift is caught loudly, not silently.
        run: |
          CORE_DEPS=$(jq -r '.dependencies // {} | keys[]' packages/core/package.json | sort)
          CLI_DEPS=$(jq -r '.dependencies // {} | keys[]' apps/cli/package.json | sort)
          MISSING=$(comm -23 <(echo "$CORE_DEPS") <(echo "$CLI_DEPS") || true)
          if [ -n "$MISSING" ]; then
            echo "❌ apps/cli is missing runtime deps that @gitrelic/core declares:"
            echo "$MISSING" | sed 's/^/    - /'
            echo ""
            echo "These need to be added to apps/cli/package.json dependencies"
            echo "because core's source is bundled inline and will require()"
            echo "them against cli's own node_modules at runtime."
            exit 1
          fi
          echo "✓ All core runtime deps are declared in cli"

      - name: Build
        run: pnpm build

      - name: Pack cli tarball
        working-directory: apps/cli
        run: pnpm pack

      - name: Install tarball in clean dir with npm
        run: |
          # Assert exactly one gitrelic-*.tgz exists. A bare glob that matches
          # nothing would expand to the literal string and `npm install` with
          # no package spec succeeds vacuously — a silent failure mode if the
          # package is ever renamed or scoped.
          shopt -s nullglob
          TARBALLS=("$GITHUB_WORKSPACE"/apps/cli/gitrelic-*.tgz)
          if [ ${#TARBALLS[@]} -ne 1 ]; then
            echo "❌ Expected exactly one gitrelic-*.tgz, found ${#TARBALLS[@]}:"
            printf '    %s\n' "${TARBALLS[@]}"
            echo "If the package was renamed or scoped, update this glob."
            exit 1
          fi
          echo "✓ Found tarball: ${TARBALLS[0]}"
          mkdir -p /tmp/smoke && cd /tmp/smoke
          npm init -y >/dev/null
          npm install "${TARBALLS[0]}"

      - name: Run installed cli against this repo
        run: |
          cd /tmp/smoke
          ./node_modules/.bin/gitrelic --path "$GITHUB_WORKSPACE" --json > report.json
          # Sanity check: report must parse, have repoName + totalCommits, and
          # include every top-level field that runner.ts returns. If core wasn't
          # bundled, any of these will be missing or the process will crash.
          # Keep this list exhaustive — silent drift (e.g. a new analyzer
          # returning undefined) should fail CI.
          node -e '
            const r = JSON.parse(require("fs").readFileSync("report.json", "utf8"));
            const required = [
              "churn", "busFactors", "ageMap", "contributors", "cursedFiles",
              "forensics", "parallelDev", "loc", "hotspots", "coupling",
              "churnVelocity", "rewriteRatio", "blastRadius", "deadCode",
              "testCoverage", "ghostFiles", "knowledgeConcentration",
              "coAuthors", "hotspotClusters", "complexityTrend",
              "commitTiming", "renameTracking", "commits"
            ];
            const missing = required.filter((k) => r[k] === undefined || r[k] === null);
            if (missing.length) {
              console.error("Missing analyzer output:", missing);
              process.exit(1);
            }
            if (!r.repoName || !r.meta || !r.meta.totalCommits) {
              console.error("Report missing repoName or meta.totalCommits");
              process.exit(1);
            }
            console.log("OK:", r.repoName, r.meta.totalCommits, "commits,",
                        required.length, "analyzer fields populated");
          '

      - name: Verify --web serves the dashboard from the installed tarball
        # Starts the installed CLI with --web, waits for the HTTP server to
        # come up, and asserts that the root serves HTML and the report
        # endpoint serves JSON. Catches the regression where dist/web was
        # missing from the published package — the cli appeared to work for
        # --json but crashed with ENOENT on --web.
        # All inputs are GitHub-provided env vars ($GITHUB_WORKSPACE) or
        # literal strings — no untrusted event data is interpolated.
        run: |
          cd /tmp/smoke
          if [ ! -f node_modules/gitrelic/dist/web/index.html ]; then
            echo "dist/web/index.html is missing from the installed tarball"
            exit 1
          fi
          echo "OK: dist/web/index.html present"

          ./node_modules/.bin/gitrelic \
            --path "$GITHUB_WORKSPACE" \
            --since "1 month ago" \
            --web > web.log 2>&1 &
          CLI_PID=$!

          # Wait for the server to come up and extract the actual port from
          # CLI output — getFreePort may pick a port other than 7777 if it
          # is already in use on the runner.
          PORT=""
          for i in $(seq 1 30); do
            if [ -s web.log ]; then
              PORT=$(grep -oP 'http://localhost:\K[0-9]+' web.log | head -1)
              if [ -n "$PORT" ] && curl -sf -o /dev/null "http://localhost:$PORT/"; then
                break
              fi
            fi
            sleep 1
          done
          if [ -z "$PORT" ]; then
            echo "❌ Could not detect server port from CLI output"
            cat web.log
            exit 1
          fi
          echo "✓ Server detected on port $PORT"

          ROOT_CODE=$(curl -s -o /tmp/root.html -w "%{http_code}" "http://localhost:$PORT/")
          REPORT_CODE=$(curl -s -o /tmp/report.json -w "%{http_code}" "http://localhost:$PORT/gitrelic-report.json")

          kill "$CLI_PID" 2>/dev/null || true

          if [ "$ROOT_CODE" != "200" ]; then
            echo "GET / returned $ROOT_CODE, expected 200"
            cat web.log
            exit 1
          fi
          if ! grep -qi "<!doctype html>" /tmp/root.html; then
            echo "GET / did not return HTML"
            head -20 /tmp/root.html
            exit 1
          fi
          if [ "$REPORT_CODE" != "200" ]; then
            echo "GET /gitrelic-report.json returned $REPORT_CODE, expected 200"
            cat web.log
            exit 1
          fi
          if ! node -e 'JSON.parse(require("fs").readFileSync("/tmp/report.json","utf8"))'; then
            echo "/gitrelic-report.json did not return valid JSON"
            exit 1
          fi
          echo "OK: --web served dashboard HTML + valid report JSON"
