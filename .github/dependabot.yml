version: 2
updates:
  # Main workspace — apps/* and packages/* are picked up via the root
  # pnpm-lock.yaml, so a single entry covers the whole monorepo.
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    # Keep this low so PRs can't pile up. Security updates are exempt from
    # this limit, so critical fixes still come through.
    open-pull-requests-limit: 3
    labels:
      - 'dependencies'
    ignore:
      # Patch-level bumps are pure noise — kill the constant `^4.17.20 →
      # ^4.17.21` PRs. Security patches still come through Dependabot's
      # security-updates feature, which is independent of this rule.
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-patch'
      # Major bumps get researched and applied on a human schedule, not
      # Dependabot's weekly cadence. Each major release needs its own
      # breaking-change review — bundling them into PRs we won't read
      # until later is worse than not having the PR at all. Run
      # `pnpm update --latest` manually when you're ready to take majors.
      # Security updates remain exempt.
      - dependency-name: '*'
        update-types:
          - 'version-update:semver-major'
    groups:
      # All dev tooling bumps land in one PR per week.
      dev-dependencies:
        dependency-type: 'development'
      # Group runtime minor bumps too.
      production-minor:
        dependency-type: 'production'
        update-types:
          - 'minor'
